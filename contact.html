<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact - Zentegix</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0f1a;--bg2:#141b2a;--card:#1a2235;--accent:#49c6ff;--accent2:#7367ff;--muted:#a8b5cc}
    *{box-sizing:border-box}
    body{margin:0;padding:0;font-family:'Poppins',sans-serif;background:linear-gradient(135deg,var(--bg),var(--bg2));color:#eef2ff;min-height:100vh;padding-top:80px}
    .navbar{position:fixed;top:0;left:0;right:0;background:rgba(10,15,26,0.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.05);padding:16px 28px;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
    .navbar-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
    .logo{font-size:20px;font-weight:700;background:linear-gradient(90deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nav-link{color:var(--muted);text-decoration:none;font-weight:500;transition:all 0.2s;margin:0 12px}
    .nav-link:hover{color:#eef2ff}
    .container{max-width:1000px;margin:0 auto;padding:40px 28px}
    .hero{text-align:center;margin-bottom:60px}
    .hero h1{font-size:42px;font-weight:700;margin:0 0 12px;background:linear-gradient(135deg,#eef2ff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero p{color:var(--muted);font-size:16px;margin:0}
    .form-container{background:linear-gradient(135deg,rgba(26,34,53,0.8),rgba(26,34,53,0.5));border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px;margin-bottom:40px}
    .form-group{margin-bottom:24px}
    label{display:block;font-weight:500;margin-bottom:8px;color:#eef2ff}
    input,textarea{width:100%;padding:12px;background:rgba(10,15,26,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#eef2ff;font-family:inherit;transition:all 0.2s}
    input:focus,textarea:focus{outline:0;border-color:var(--accent);box-shadow:0 0 12px rgba(73,198,255,0.2)}
    textarea{resize:vertical;min-height:120px}
    .btn{display:inline-block;padding:12px 28px;background:linear-gradient(90deg,var(--accent2),var(--accent));border:0;border-radius:8px;color:#0a0f1a;font-weight:600;cursor:pointer;transition:all 0.2s;text-decoration:none}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(115,103,255,0.5)}
    .info{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;margin-top:40px}
    .info-card{background:linear-gradient(135deg,rgba(26,34,53,0.6),rgba(26,34,53,0.3));border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:24px;text-align:center}
    .info-icon{font-size:32px;margin-bottom:12px}
    .info-card h3{margin:0 0 8px;color:#eef2ff}
    .info-card p{color:var(--muted);margin:0;font-size:14px}
    footer{text-align:center;color:var(--muted);font-size:13px;padding:20px;margin-top:40px;border-top:1px solid rgba(255,255,255,0.05)}
    
    /* Responsive */
    @media (max-width:768px){
      .navbar{padding:12px 16px}
      .container{padding:24px 16px}
      .hero h1{font-size:28px}
      .form-container{padding:24px}
      .info{gap:16px;margin-top:24px}
      footer{font-size:12px}
    }
    @media (max-width:520px){
      .navbar{padding:10px 12px}
      .container{padding:16px}
      .hero h1{font-size:20px}
      .hero p{font-size:12px}
      .form-container{padding:16px}
      .form-group{margin-bottom:16px}
      label{font-size:13px;margin-bottom:6px}
      input,textarea{padding:10px;font-size:13px}
      textarea{min-height:100px}
      .btn{padding:10px 16px;font-size:12px}
      .info{grid-template-columns:1fr;gap:12px}
      .info-card{padding:16px}
      .info-icon{font-size:28px}
    }
    @media (max-width:400px){
      .hero h1{font-size:16px}
      .container{padding:12px}
      .info-card{padding:12px}
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="navbar-inner">
        <a href="index.html" class="logo" style="text-decoration:none;cursor:pointer">☎️ Zentegix</a>
    </div>
  </div>
  <div class="container">
    <div class="hero">
      <h1>Contact Us</h1>
      <p>We'd love to hear from you. Get in touch with our team</p>
    </div>

    <div class="form-container">
      <form id="contactForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="btn">Send Message</button>
      </form>
    </div>

    <div class="info">
      <div class="info-card">
        <div class="info-icon">📍</div>
        <h3>Address</h3>
        <p>Zentegix HQ<br>Delhi, India</p>
      </div>
      <div class="info-card">
        <div class="info-icon">📧</div>
        <h3>Email</h3>
        <p>support@zentegix.com<br>hello@zentegix.com</p>
      </div>
      <div class="info-card">
        <div class="info-icon">📱</div>
        <h3>Phone</h3>
        <p>+91___________<br>+91_________</p>
      </div>
      <div class="info-card">
        <div class="info-icon">🕐</div>
    </div>
  </div>
  <footer>© 2025 Zentegix. All rights reserved.</footer>
  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e){
      e.preventDefault();
      alert('Thank you for contacting us! We will get back to you soon.');
      this.reset();
    });
  </script>
</body>
</html>
