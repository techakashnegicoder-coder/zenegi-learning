<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — Zentegix (Prob)</title>
    <link rel="stylesheet" href="styles.css">
  <style>
    :root{--bg:#071029;--card:#0f1724;--accent:#49c6ff;--muted:#9fb3cf}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter, Poppins, Arial, sans-serif;background:linear-gradient(180deg,var(--bg),#041022);color:#eaf2ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:100%;max-width:460px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);border:1px solid rgba(255,255,255,0.04);padding:28px;border-radius:12px;box-shadow:0 10px 40px rgba(2,6,23,0.6)}
    h1{margin:0 0 8px;font-size:22px}
    p.lead{margin:0 0 20px;color:var(--muted)}
    label{display:block;font-size:13px;margin-bottom:8px;color:var(--muted)}
    .field{margin-bottom:14px}
    input[type=email], input[type=password]{width:100%;padding:12px 14px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.06);color:inherit;font-size:15px}
    .row{display:flex;gap:10px;align-items:center}
    .btn{display:inline-block;padding:12px 16px;border-radius:10px;border:0;background:linear-gradient(90deg,#7367ff,var(--accent));color:#071029;font-weight:700;cursor:pointer}
    .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted)}
    .muted{color:var(--muted);font-size:13px}
    .actions{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
    .error{color:#ffb4b4;background:rgba(255,180,180,0.06);padding:8px;border-radius:8px;margin-bottom:10px;font-size:13px}
    .success{color:#b7ffd9;background:rgba(30,200,120,0.06);padding:8px;border-radius:8px;margin-bottom:10px;font-size:13px}
    .helper{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
    .small{font-size:13px;color:var(--muted)}
    .show-hide{background:transparent;border:0;color:var(--muted);cursor:pointer}
    footer{margin-top:16px;text-align:center;color:var(--muted);font-size:13px}
    @media (max-width:520px){.card{padding:18px}}
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>Sign in to Zentegix</h1>
    <p class="lead">Welcome back — enter your credentials to continue.</p>

    <div id="msg"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" inputmode="email" autocomplete="email" required placeholder="you@example.com">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div style="position:relative">
          <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Minimum 6 characters" style="padding-right:84px">
          <button type="button" id="togglePwd" class="show-hide" aria-label="Show password" style="position:absolute;right:6px;top:6px;padding:8px 10px;border-radius:8px">Show</button>
        </div>
      </div>

      <div class="helper">
        <label class="small"><input id="remember" type="checkbox"> Remember me</label>
        <a href="#" id="forgot" class="small" style="color:var(--accent);text-decoration:none">Forgot?</a>
      </div>

      <div style="margin-top:18px;display:flex;gap:10px">
        <button class="btn" type="submit">Sign in</button>
        <button class="btn ghost" type="button" id="guestBtn">Continue as Guest</button>
      </div>

      <p class="muted" style="margin-top:12px">Don't have an account? <a href="#" id="register" style="color:var(--accent)">Create one</a></p>
    </form>

    <footer>© 2025 Zentegix</footer>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const toggle = document.getElementById('togglePwd');
    const msgBox = document.getElementById('msg');
    const guestBtn = document.getElementById('guestBtn');

    function setMessage(text, type){
      msgBox.innerHTML = text ? `<div class="${type==='ok'?'success':'error'}">${text}</div>` : '';
    }

    toggle.addEventListener('click', ()=>{
      const isPwd = password.type === 'password';
      password.type = isPwd ? 'text' : 'password';
      toggle.innerText = isPwd ? 'Hide' : 'Show';
      toggle.setAttribute('aria-label', isPwd ? 'Hide password' : 'Show password');
    });

    function validEmail(v){
      return /\S+@\S+\.\S+/.test(v);
    }

    form.addEventListener('submit', (e)=>{
      e.preventDefault();
      setMessage('','');

      const em = email.value.trim();
      const pw = password.value;

      if (!validEmail(em)) { setMessage('Please enter a valid email address.','err'); email.focus(); return; }
      if (pw.length < 6) { setMessage('Password must be at least 6 characters.','err'); password.focus(); return; }

      // Simulate authentication (for demo only)
      const user = { email: em, loggedAt: new Date().toISOString() };
      try{
        localStorage.setItem('Zentegix_user', JSON.stringify(user));
      } catch(err){ console.warn('localStorage unavailable', err); }

      setMessage('Login successful! Redirecting...', 'ok');

      // Redirect back to index.html in the same folder if available
      setTimeout(()=>{
        const fallback = 'index.html';
        // Try to navigate to `index.html` in the same directory
        window.location.href = fallback;
      },900);
    });

    guestBtn.addEventListener('click', ()=>{
      try{ localStorage.removeItem('Zentegix_user'); } catch(e){}
      setMessage('Continuing as guest...', 'ok');
      setTimeout(()=> location.href = 'index.html', 700);
    });

    // small UX: restore remembered email
    window.addEventListener('DOMContentLoaded', ()=>{
      try{
        const saved = localStorage.getItem('Zentegix_user');
        if (saved){
          const u = JSON.parse(saved);
          if (u && u.email) email.value = u.email;
        }
      }catch(e){}
    });
  </script>
</body>
</html>
